project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - notes/index.qmd
    - notes/**/*.qmd
  pre-render:
    - python3 scripts/extract_link_graph.py --output data/notes_link_graph_payload.json --include-prefix notes/
  resources:
    - data/**
    - book_extracted.json
    - references.bib
    - assets/**
    - viewer/**

website:
  title: "Evaluation Knowledge Base"
  page-footer:
    center: "[defenceeconomist.github.io](https://defenceeconomist.github.io)"
  navbar:
    left:
      - href: notes/index.qmd
        text: Notes
    right:
      - icon: github
        href: https://github.com/defenceeconomist/evaluation-kb
        aria-label: GitHub repository
  sidebar:
    - id: notes
      title: "Notes"
      style: docked
      search: true
      collapse-level: 1
      contents:
        - href: notes/index.qmd
          text: Notes Overview
        - href: notes/evaluation-texts-compared.qmd
          text: Comparing Evaluation Texts
        - href: notes/magenta-book-evaluation-model-alignment.qmd
          text: Magenta Book Model Alignment
        - section: "Evaluation Texts"
          href: notes/purposeful-programme-theory/index.qmd
          contents:
            - href: notes/purposeful-programme-theory/index.qmd
              text: Purposeful Program Theory
            - href: notes/practical-program-evaluation/index.qmd
              text: Practical Program Evaluation
            - href: notes/qualitative-research-evaluation-methods/index.qmd
              text: Qualitative Research & Evaluation Methods
            - href: notes/realistic-evaluation/index.qmd
              text: Realistic Evaluation
            - href: notes/impact-evaluation-in-practice/index.qmd
              text: Impact Evaluation in Practice
            - href: notes/handbook-practical-program-evaluation/index.qmd
              text: Handbook of Practical Program Evaluation
            - href: notes/evaluation-systematic-approach/index.qmd
              text: "Evaluation: A Systematic Approach"
            - href: notes/essentials-utilization-focused-evaluation/index.qmd
              text: Essentials of Utilization-Focused Evaluation
            - href: notes/magenta-book/index.qmd
              text: Magenta Book
            - href: notes/evaluation-theory-models-applications/index.qmd
              text: Evaluation Theory, Models, and Applications

format:
  html:
    theme: cosmo
    css:
      - assets/css/site.css
      - assets/css/link_network.css
    toc: true
    toc-depth: 3

bibliography: references.bib
